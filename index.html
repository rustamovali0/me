<!DOCTYPE html>
<html lang="az" class="scroll-smooth">
<head>

    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://icwpaipqqqwjpooazmcu.supabase.co/storage/v1/object/sign/logos/IMG_3732.webp?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV8xMjAzOTRmMy04ZjhmLTQwOTItYjA2Ny04ZDBmODZiOWE1OWEiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJsb2dvcy9JTUdfMzczMi53ZWJwIiwic2NvcGUiOiJkb3dubG9hZCIsImlhdCI6MTc4MjgxMDU4NywiZXhwIjoyMDk4MTcwNTg3fQ.o2SgZW9r9GJKgZ1hcD43-sMWc4uxQEvOUJQWzxnE6PU">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        ink: '#191b1c',
                        paper: '#f6f7f3',
                        executive: '#123c35',
                        copper: '#a56a43',
                        ledger: '#e7e9df',
                        signal: '#b3261e',
                    },
                    boxShadow: {
                        executive: '0 28px 80px -46px rgba(25, 27, 28, 0.58)',
                        lift: '0 18px 42px -30px rgba(18, 60, 53, 0.55)',
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --paper: #f6f7f3;
            --ink: #191b1c;
            --executive: #123c35;
            --copper: #a56a43;
            --ledger: #e7e9df;
        }
        * {
            letter-spacing: 0;
        }
        body {
            -webkit-tap-highlight-color: transparent;
            background:
                linear-gradient(90deg, rgba(18, 60, 53, 0.08) 1px, transparent 1px),
                linear-gradient(180deg, rgba(18, 60, 53, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 18% 12%, rgba(165, 106, 67, 0.13), transparent 28%),
                radial-gradient(circle at 90% 8%, rgba(18, 60, 53, 0.10), transparent 28%),
                var(--paper);
            background-size: 56px 56px, 56px 56px, auto, auto, auto;
            color: var(--ink);
        }
        .executive-panel {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(18, 60, 53, 0.13);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.85) inset, 0 28px 80px -52px rgba(25, 27, 28, 0.48);
            backdrop-filter: blur(20px) saturate(1.05);
            -webkit-backdrop-filter: blur(20px) saturate(1.05);
        }
        .executive-rule {
            background: linear-gradient(90deg, var(--executive), var(--copper), transparent);
        }
        .ink-text {
            text-wrap: balance;
        }
        .portrait-frame::after {
            content: "";
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(255, 255, 255, 0.38);
            pointer-events: none;
        }
        .stable-button {
            min-height: 48px;
        }
        @media (max-width: 640px) {
            body {
                background-size: 38px 38px, 38px 38px, auto, auto, auto;
            }
        }
    </style>
</head>

<body x-data="executiveCard()" class="min-h-screen overflow-x-hidden font-sans antialiased">
    <main class="relative min-h-screen px-4 py-4 sm:px-6 lg:px-8 lg:py-4">
        <div class="mx-auto flex min-h-[calc(100vh-1.5rem)] w-full max-w-7xl flex-col">
            <header class="mb-4 flex items-center justify-between gap-3">
                <a href="https://rustamoff.site" target="_blank" class="inline-flex stable-button items-center gap-2 rounded-full border border-executive/15 bg-white/65 px-4 text-xs font-extrabold text-executive shadow-sm transition hover:border-executive/35 hover:bg-white">
                    <i class="fa-solid fa-briefcase text-[12px] text-copper"></i>
                    <span>Şəxsi səhifə</span>
                </a>

                <div class="flex items-center gap-2">
                    <button @click="showQrModal = true" class="stable-button w-12 rounded-full border border-executive/15 bg-white/65 text-executive shadow-sm transition hover:border-executive/35 hover:bg-white active:scale-95" aria-label="QR Kodu göstər">
                        <i class="fa-solid fa-qrcode text-[15px]"></i>
                    </button>
                    <button @click="shareCard()" class="stable-button w-12 rounded-full border border-executive/15 bg-white/65 text-executive shadow-sm transition hover:border-executive/35 hover:bg-white active:scale-95" aria-label="Profili paylaş">
                        <i class="fa-solid fa-share-nodes text-[15px]"></i>
                    </button>
                </div>
            </header>

            <section class="grid items-start gap-5 lg:grid-cols-[0.92fr_1.08fr]">
                <div class="portrait-frame relative min-h-[300px] overflow-hidden rounded-[1.75rem] bg-ink shadow-executive sm:min-h-[320px] lg:min-h-[520px]">
                    <img :src="cardData.profile.avatar" :alt="cardData.profile.name" class="absolute inset-0 h-full w-full object-cover object-center opacity-95" @error="handleAvatarError($event)">
                    <div class="absolute inset-0 bg-gradient-to-t from-ink via-ink/25 to-transparent"></div>
                </div>

                <div class="grid gap-5">
                    <div class="executive-panel rounded-[1.75rem] p-5 sm:p-6 lg:p-7">
                        <div class="max-w-2xl">
                            <h1 class="ink-text text-[2.35rem] font-black leading-[0.95] text-ink sm:text-5xl lg:text-[4.1rem]" x-text="cardData.profile.name"></h1>
                            <div class="executive-rule my-5 h-1 w-28 rounded-full"></div>
                        </div>

                        <div class="mt-6 grid gap-3 sm:grid-cols-2 sm:max-w-xl">
                            <a href="tel:+994773313327" class="stable-button inline-flex items-center justify-center gap-2 rounded-2xl bg-executive px-5 text-sm font-extrabold text-white shadow-lift transition hover:bg-[#0c2d28] active:scale-[0.98]">
                                <i class="fa-solid fa-phone-volume text-[13px]"></i>
                                Əlaqə saxla
                            </a>
                            <button @click="downloadVCard()" class="stable-button inline-flex items-center justify-center gap-2 rounded-2xl border border-executive/15 bg-white px-5 text-sm font-extrabold text-executive shadow-sm transition hover:border-executive/35 active:scale-[0.98]">
                                <i class="fa-solid fa-address-book text-[13px] text-copper"></i>
                                Kontaktı yüklə
                            </button>
                        </div>
                    </div>

                    <div id="contact" class="executive-panel rounded-[1.75rem] p-4 lg:p-5 scroll-mt-5">
                        <div class="mb-3 flex items-center justify-between">
                            <h2 class="text-[11px] font-black text-ink/45">ƏLAQƏ</h2>
                        </div>

                        <div class="grid gap-3">
                            <template x-for="contact in cardData.contacts" :key="contact.id">
                                <div class="flex items-center justify-between rounded-2xl border border-executive/10 bg-white/60 p-3">
                                    <a :href="contact.href" class="flex min-w-0 flex-1 items-center gap-3">
                                        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-executive text-white">
                                            <i :class="contact.icon" class="text-[14px]"></i>
                                        </span>
                                        <span class="min-w-0 text-left">
                                            <span class="block text-[10px] font-black text-ink/40" x-text="contact.label"></span>
                                            <span class="block truncate text-sm font-extrabold text-ink" x-text="contact.value"></span>
                                        </span>
                                    </a>
                                    <button @click="copyToClipboard(contact.value, contact.label)" class="ml-2 flex h-10 w-10 shrink-0 items-center justify-center rounded-xl text-ink/45 transition hover:bg-executive/10 hover:text-executive" title="Kopyala">
                                        <i class="fa-regular fa-copy text-[13px]"></i>
                                    </button>
                                </div>
                            </template>
                        </div>

                        <div class="mt-3 grid grid-cols-3 gap-2.5">
                            <template x-for="social in cardData.socials" :key="social.name">
                                <a :href="social.href" target="_blank" class="flex min-h-[68px] flex-col items-center justify-center rounded-2xl border border-executive/10 bg-white/60 px-2 text-center transition hover:-translate-y-0.5 hover:border-executive/25 hover:bg-white">
                                    <i :class="social.icon" class="mb-1.5 text-[18px] text-executive"></i>
                                    <span class="w-full truncate text-[10px] font-black text-ink/65" x-text="social.name"></span>
                                </a>
                            </template>
                        </div>
                    </div>
                </div>
            </section>

            <footer class="mt-4 flex flex-col gap-2 border-t border-executive/10 pt-2 text-xs font-semibold text-ink/45 sm:flex-row sm:items-center sm:justify-between">
                <span>&copy; 2026 Əli Rüstəmov. Şəxsi rəqəmsal profil.</span>
                <a href="https://rustamoff.site" target="_blank" class="font-extrabold text-executive hover:text-copper">rustamoff.site</a>
            </footer>
        </div>
    </main>

    <div class="fixed bottom-6 left-1/2 z-50 w-full max-w-xs -translate-x-1/2 px-4 pointer-events-none"
         x-show="toast.show"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-4 scale-95"
         style="display: none;">
        <div class="flex items-center gap-2.5 rounded-2xl border border-executive/15 bg-ink/95 px-4 py-3 text-xs font-extrabold text-white shadow-xl backdrop-blur-md">
            <span class="flex h-5 w-5 items-center justify-center rounded-full bg-copper text-[10px] text-white">
                <i class="fa-solid fa-check"></i>
            </span>
            <span x-text="toast.message"></span>
        </div>
    </div>

    <div class="fixed inset-0 z-50 flex items-center justify-center p-4" x-show="showQrModal" style="display: none;">
        <div class="fixed inset-0 bg-ink/70 backdrop-blur-sm" @click="showQrModal = false"></div>
        <div class="executive-panel relative z-10 w-full max-w-sm rounded-[2rem] p-6 text-center shadow-2xl"
             x-show="showQrModal"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95">
            <button @click="showQrModal = false" class="absolute right-4 top-4 flex h-9 w-9 items-center justify-center rounded-full bg-white text-ink/50 transition hover:text-ink">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <h3 class="mb-1.5 text-lg font-black text-ink">QR Kod</h3>
            <p class="mx-auto mb-5 max-w-xs text-xs font-semibold leading-5 text-ink/55">Profili sürətli paylaşmaq üçün QR kodu skan edin.</p>

            <div class="mx-auto flex h-48 w-48 items-center justify-center rounded-3xl border border-executive/10 bg-white p-3 shadow-inner">
                <img :src="qrCodeUrl(220)" alt="Ali Rustamov QR Code" class="h-full w-full object-contain">
            </div>

            <p class="mt-4 text-xs font-black text-executive" x-text="profileUrlLabel"></p>

            <div class="mt-6 space-y-2.5">
                <button @click="downloadQrCode()" class="stable-button flex w-full items-center justify-center gap-2 rounded-2xl bg-executive px-4 text-xs font-black text-white transition hover:bg-[#0c2d28]">
                    <i class="fa-solid fa-download text-[11px]"></i>
                    QR kodu yüklə
                </button>
                <div class="grid grid-cols-2 gap-2.5">
                    <button @click="copyToClipboard(profileUrl, 'Link'); showQrModal = false" class="stable-button flex items-center justify-center gap-1.5 rounded-2xl border border-executive/15 bg-white px-3 text-xs font-black text-executive transition hover:border-executive/35">
                        <i class="fa-solid fa-link text-[11px]"></i>
                        Kopyala
                    </button>
                    <a :href="profileUrl" target="_blank" class="stable-button flex items-center justify-center gap-1.5 rounded-2xl border border-executive/15 bg-white px-3 text-xs font-black text-executive transition hover:border-executive/35">
                        <i class="fa-solid fa-arrow-up-right-from-square text-[11px]"></i>
                        Aç
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function executiveCard() {
            const fallbackUrl = 'https://me-virid-theta.vercel.app';

            return {
                showQrModal: false,
                toast: {
                    show: false,
                    message: ''
                },
                profileUrl: window.location.origin && window.location.origin !== 'null' ? window.location.origin : fallbackUrl,
                profileUrlLabel: 'Şəxsi profil linki',
                cardData: {
                    profile: {
                        name: 'Əli Rüstəmov',
                        title: 'Şəxsi profil',
                        shortBio: '',
                        avatar: 'https://icwpaipqqqwjpooazmcu.supabase.co/storage/v1/object/sign/logos/IMG_3732.webp?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV8xMjAzOTRmMy04ZjhmLTQwOTItYjA2Ny04ZDBmODZiOWE1OWEiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJsb2dvcy9JTUdfMzczMi53ZWJwIiwic2NvcGUiOiJkb3dubG9hZCIsImlhdCI6MTc4MjgxMDU4NywiZXhwIjoyMDk4MTcwNTg3fQ.o2SgZW9r9GJKgZ1hcD43-sMWc4uxQEvOUJQWzxnE6PU'
                    },
                    contacts: [
                        { id: 'phone', label: 'TELEFON', value: '077-331-33-27', href: 'tel:+994773313327', icon: 'fa-solid fa-phone' },
                        { id: 'email', label: 'E-POÇT', value: 'me@rustamoff.site', href: 'mailto:me@rustamoff.site', icon: 'fa-regular fa-envelope' }
                    ],
                    socials: [
                        { name: 'WhatsApp', href: 'https://wa.me/994773313327?text=Salam.%20Vizitkart%20payla%C5%9Fd%C4%B1%C4%9F%C4%B1n%C4%B1z%20%C5%9F%C9%99xs%20sizinl%C9%99%20%C9%99laq%C9%99%20saxlay%C4%B1r.', icon: 'fa-brands fa-whatsapp' },
                        { name: 'Instagram', href: 'https://www.instagram.com/ru8tam0ff/', icon: 'fa-brands fa-instagram' },
                        { name: 'Telegram', href: 'https://t.me/rustamoffali', icon: 'fa-solid fa-paper-plane' }
                    ]
                },

                handleAvatarError(event) {
                    event.target.onerror = null;
                    event.target.src = 'https://placehold.co/900x1200/123c35/ffffff?text=Eli+Rustemov';
                },

                copyToClipboard(text, label) {
                    const el = document.createElement('textarea');
                    el.value = text;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    this.showToast(`${label} kopyalandı!`);
                },

                showToast(message) {
                    this.toast.message = message;
                    this.toast.show = true;
                    setTimeout(() => {
                        this.toast.show = false;
                    }, 2500);
                },

                qrCodeUrl(size = 600) {
                    return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&format=png&data=${encodeURIComponent(this.profileUrl)}`;
                },

                async downloadQrCode() {
                    const downloadLink = document.createElement('a');
                    downloadLink.href = this.qrCodeUrl(1000);
                    downloadLink.download = 'Ali_Rustamov_QR.png';
                    downloadLink.target = '_blank';
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    this.showToast('QR kod yükləndi!');
                },

                downloadVCard() {
                    const vCardContent = [
                        'BEGIN:VCARD',
                        'VERSION:3.0',
                        'N:Rüstəmov;Əli;;;',
                        `FN:${this.cardData.profile.name}`,
                        'TEL;TYPE=CELL,VOICE;type=pref:+994773313327',
                        'EMAIL;TYPE=PREF,INTERNET:me@rustamoff.site',
                        `URL:${this.profileUrl}`,
                        'X-SOCIALPROFILE;type=instagram:https://instagram.com/ru8tam0ff/',
                        'END:VCARD'
                    ].join('\n');

                    const blob = new Blob([vCardContent], { type: 'text/vcard;charset=utf-8;' });
                    const blobUrl = URL.createObjectURL(blob);
                    const downloadLink = document.createElement('a');
                    downloadLink.href = blobUrl;
                    downloadLink.download = 'Ali_Rustamov_kontakt.vcf';
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    URL.revokeObjectURL(blobUrl);
                    this.showToast('Kontakt yükləndi!');
                },

                shareCard() {
                    const shareData = {
                        title: `${this.cardData.profile.name} | Şəxsi Profil`,
                        text: this.cardData.profile.title,
                        url: this.profileUrl
                    };

                    if (navigator.share) {
                        navigator.share(shareData)
                            .then(() => this.showToast('Müvəffəqiyyətlə paylaşıldı'))
                            .catch((err) => console.log('Paylaşım ləğv edildi', err));
                    } else {
                        this.copyToClipboard(this.profileUrl, 'Profil linki');
                    }
                }
            }
        }
    </script>
</body>
</html>
