                    ],
                    socials: [
                        { name: 'WhatsApp', href: 'https://wa.me/994773313327?text=Salam.%20Sizinl%C9%99%20me.rustamoff.site%20vizitkart%C4%B1%20%C3%BCz%C9%99rind%C9%99n%20%C9%99laq%C9%99%20saxlay%C4%B1ram.', icon: 'fa-brands fa-whatsapp' },
                        { name: 'Instagram', href: 'https://www.instagram.com/ru8tam0ff/', icon: 'fa-brands fa-instagram' },
                        { name: 'Telegram', href: 'https://t.me/rustamoffali', icon: 'fa-solid fa-paper-plane' }
                    ]
                },

                handleAvatarError(event) {
                    event.target.onerror = null;
                    event.target.src = 'https://placehold.co/900x1200/080706/d8c08a?text=Ali+Rustamov';
                },

                copyToClipboard(text, label) {
                    const el = document.createElement('textarea');
                    el.value = text;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    this.showToast(`${label} kopyalandı!`);
                },

                showToast(message) {
                    this.toast.message = message;
                    this.toast.show = true;
                    setTimeout(() => {
                        this.toast.show = false;
                    }, 2500);
                },

                async sendContactMessage() {
                    const message = this.contactMessage.trim().slice(0, 900);
                    if (!message) {
                        this.messageStatus = 'Mesaj yazın.';
                        this.messageStatusType = 'error';
                        return;
                    }

                    this.messageSending = true;
                    this.messageStatus = '';
                    this.messageStatusType = 'idle';

                    try {
                        const response = await fetch(KEMER_MESSAGE_FUNCTION_URL, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                apikey: KEMER_SUPABASE_PUBLISHABLE_KEY,
                                authorization: `Bearer ${KEMER_SUPABASE_PUBLISHABLE_KEY}`
                            },
                            body: JSON.stringify({
                                source: 'me-vizitkart',
                                message,
                                page_path: `${window.location.pathname}${window.location.hash || ''}`,
                                user_agent: navigator.userAgent
                            })
                        });

                        const result = await response.json().catch(() => ({}));
                        if (!response.ok) throw new Error(result.error || 'Mesaj göndərilmədi.');

                        this.contactMessage = '';
                        this.messageStatus = 'Mesaj göndərildi.';
                        this.messageStatusType = 'success';
                        this.showToast('Mesaj göndərildi!');
                    } catch (error) {
                        const errorMessage = error instanceof Error ? error.message : 'Mesaj göndərilmədi.';
                        this.messageStatus = errorMessage.includes('Brutforce') ? 'Brutforce detected' : errorMessage;
                        this.messageStatusType = 'error';
                    } finally {
                        this.messageSending = false;
                    }
                },

                qrCodeUrl(size = 600) {
                    return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&format=png&data=${encodeURIComponent(this.profileUrl)}`;
                },

                async downloadQrCode() {
                    const downloadLink = document.createElement('a');
                    downloadLink.href = this.qrCodeUrl(1000);
                    downloadLink.download = 'Ali_Rustamov_QR.png';
                    downloadLink.target = '_blank';
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    this.showToast('QR kod yükləndi!');
                },

                downloadVCard() {
                    const vCardContent = [
                        'BEGIN:VCARD',
                        'VERSION:3.0',
                        'N:Rüstəmov;Əli;;;',
                        `FN:${this.cardData.profile.name}`,
                        'TEL;TYPE=CELL,VOICE;type=pref:+994773313327',
                        'EMAIL;TYPE=PREF,INTERNET:me@rustamoff.site',
                        `URL:${this.profileUrl}`,
                        'X-SOCIALPROFILE;type=instagram:https://instagram.com/ru8tam0ff/',
                        'X-SOCIALPROFILE;type=telegram:https://t.me/rustamoffali',
                        'END:VCARD'
                    ].join('\n');

                    const blob = new Blob([vCardContent], { type: 'text/vcard;charset=utf-8;' });
                    const blobUrl = URL.createObjectURL(blob);
                    const downloadLink = document.createElement('a');
                    downloadLink.href = blobUrl;
                    downloadLink.download = 'Ali_Rustamov_kontakt.vcf';
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    URL.revokeObjectURL(blobUrl);
                    this.showToast('Kontakt telefona əlavə olunur!');
                },

                shareCard() {
                    const shareData = {
                        title: `${this.cardData.profile.name} | Premium Vizitkart`,
                        text: this.cardData.profile.title,
                        url: this.profileUrl
                    };

                    if (navigator.share) {
                        navigator.share(shareData)
                            .then(() => this.showToast('Müvəffəqiyyətlə paylaşıldı'))
                            .catch((err) => console.log('Paylaşım ləğv edildi', err));
                    } else {
                        this.copyToClipboard(this.profileUrl, 'Profil linki');
                    }
                }
            }
        }
    </script>
</body>
</html>
